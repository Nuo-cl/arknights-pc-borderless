name: Build and Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile to exe
        uses: benmusson/ahk2exe-action@v1
        with:
          in: borderless.ahk
          out: borderless.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            borderless.exe
            borderless.ahk
          generate_release_notes: true
